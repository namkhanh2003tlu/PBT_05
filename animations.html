<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <header class="anim-header">
        <h1>Animations Demo</h1>
        <div class="spinner"></div>
    </header>

    <main>
        <section class="cards">
            <article class="anim-card fade-item">
                <div class="image-wrap">
                    <img src="https://placehold.co/400x300?text=Card+1" alt="Card 1">
                </div>
                <div class="card-body">
                    <h2>Card Hover</h2>
                    <p>Hover lên để xem chuyển động và shadow.</p>
                    <button>Buy now</button>
                </div>
            </article>
            <article class="anim-card fade-item">
                <div class="image-wrap">
                    <img src="https://placehold.co/400x300?text=Card+2" alt="Card 2">
                </div>
                <div class="card-body">
                    <h2>Image Zoom</h2>
                    <p>Ảnh phóng to nhẹ khi hover.</p>
                    <button>Buy now</button>
                </div>
            </article>
            <article class="anim-card fade-item">
                <div class="image-wrap">
                    <img src="https://placehold.co/400x300?text=Card+3" alt="Card 3">
                </div>
                <div class="card-body">
                    <h2>Transition Button</h2>
                    <p>Nút thay màu mượt khi hover.</p>
                    <button>Buy now</button>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
